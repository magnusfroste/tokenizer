  # --- hard_code_debugging → balanced (stack trace + code) ---
  - id: eval_020
    name: nil panic stack trace
    task_type: hard_code_debugging
    risk_level: medium
    prompt: |
      My service panics. Here is the stack trace:
      goroutine 1 [running]:
      main.handle(0x0)
      	/app/main.go:42 +0x1d
      panic: runtime error: invalid memory address or nil pointer dereference
      Fix the bug in `func handle(req *Request)`.
    expected_route: {tier: balanced}
  - id: eval_021
    name: python traceback debug
    task_type: hard_code_debugging
    risk_level: medium
    prompt: |
      Traceback (most recent call last):
        File "app.py", line 88, in <module>
          process(data)
      KeyError: 'user_id'
      Debug this in the code `def process(data): return data['user_id']`.
    expected_route: {tier: balanced}
  - id: eval_022
    name: java exception trace
    task_type: hard_code_debugging
    risk_level: medium
    prompt: |
      Exception in thread "main" java.lang.NullPointerException
        at com.example.Service.run(Service.java:31)
      Here is the method: `public void run() { repo.save(null); }` — what is wrong?
    expected_route: {tier: balanced}

