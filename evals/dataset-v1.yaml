# Eval dataset v1 — golden routing cases.
#
# Each case is a prompt plus the expected routing outcome. The eval runner
# (internal/evals) classifies the prompt with the real feature extractor, runs
# it through the routing engine in dry-run mode (no provider call), and compares
# the selected model tier against expected_route.tier.
#
# Constraints (ISSUE-037):
#   - >= 50 cases
#   - every case has a task_type and an expected route
#   - NO real secrets, API keys, or customer data — all values are fabricated
#
# tier vocabulary: cheap | balanced | premium
version: eval-v1
cases:
  # --- security_review → premium ---
  - id: eval_001
    name: auth vulnerability review
    task_type: security_review
    risk_level: high
    prompt: "Please do a security review of our login flow and find any vulnerability in the auth bypass logic."
    expected_route: {tier: premium}
  - id: eval_002
    name: xss audit
    task_type: security_review
    risk_level: high
    prompt: "Audit this template rendering for XSS and CSRF issues."
    expected_route: {tier: premium}
  - id: eval_003
