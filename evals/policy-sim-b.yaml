version: policy-sim-b
settings:
  default_model_profile: balanced
  conservative_unknowns: true
  max_router_overhead_ms: 100
  default_timeout_ms: 30000
  default_retention: standard
rules:
  - id: tenant_ab_premium
    when:
      tenant: tenant-ab
    route:
      force:
        model_profile: premium
  - id: block_experiment_project
    when:
      project: blocked-proj
    route:
      block:
        code: experiment_block
        reason: blocked in policy B
        status: 403
  - id: shared_default
    when: {}
    route:
      defaults:
        model_profile: balanced
